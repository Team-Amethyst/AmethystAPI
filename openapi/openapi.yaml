openapi: 3.1.0
info:
  title: Amethyst Engine API
  description: |
    Server-to-server analytical API for Amethyst Draft. Licensed routes require `x-api-key`.

    **AmethystDraft BFF — `finalizeEngineValuationPostPayload` (production):** flat JSON
    (`schemas/valuation-request.v1.schema.json`): `roster_slots` as `[{ position, count }, …]`,
    **auction-only** `drafted_players`, optional `pre_draft_rosters` as **either** a map
    `team_id → rows` **or** `[{ team_id, players[] }, …]`, optional `player_ids`, and
    **`schema_version` and/or `schemaVersion`** (camelCase wins when both are sent).

    **Nested** `{ league, draft_state, … }` (`schemas/valuation-request-v1.json`) remains
    supported for checkpoints/fixtures. Nested `league.roster_slots` may be an **array** or a
    **map** of slot → count (Draft `apps/api/test-fixtures/.../pre_draft.json` style).

    **Budget contract:** If `budget_by_team_id` is present and non-empty, remaining league
    dollars = **sum of map values** and **`paid` on drafted rows is ignored**. If absent,
    remaining = `total_budget * num_teams` − **sum(`drafted_players[].paid`)**. In v1,
    `pre_draft_rosters`, `minors`, and `taxi` do **not** affect spend or drafted-id filtering
    (only `drafted_players` / `draft_state` ids remove players from the pool).

    **HTTP 400 — request validation:** Body is **only** `{ "errors": [ { "field", "message" } ] }`
    (Zod parse failures, duplicate `player_id`, spend over cap, etc.). No `AppError` envelope.

    **HTTP 422 — output validation:** Same `errors` array shape when inflation output failed
    sanity checks (**no** `valuations` / price payload).

    **Tracing:** Optional `X-Request-Id` from Draft; **echoed** on the response on success and
    error paths that run the request-id middleware.

    **Success:** Valuation responses include **`engine_contract_version`** (currently `"1"`).

    **`POST /valuation/calculate`** is not Redis-cached. **`paid`** is non-negative; duplicate
    `player_id` in drafted rows is rejected; without `budget_by_team_id`, total paid cannot exceed
    `total_budget × num_teams`.

    **Rate limits (per `x-api-key`, or IP if key missing):** Tunable via env — `RATE_LIMIT_ENABLED`
    (`0`/`off` to disable), `RATE_LIMIT_VALUATION_MAX` + `RATE_LIMIT_VALUATION_WINDOW_MS`,
    `RATE_LIMIT_CATALOG_MAX` + `RATE_LIMIT_CATALOG_WINDOW_MS`. Defaults ~300/min valuation,
    ~1200/min catalog; **off automatically under Vitest** unless `RATE_LIMIT_ENABLED=1`.

    **Valuation requests — `league_id`:** Send optional **`league_id`** on flat bodies (or nested
    **`league.id`**) so `context_v2.scope.league_id` is not `"unknown"`.

    **Valuation responses — field semantics:** `baseline_value` is the **post–scoring-baseline**
    list price (Mongo `value` after format/roster/projection steps), **not** raw catalog dollars.
    **`inflation_factor`** is clamped by the workflow (floor/cap) when pool list dollars are
    extreme vs remaining budget. **`scarcity_adjustment`** is **`0`** (scarcity is embedded in
    **`baseline_value`**); **`inflation_adjustment`** equals **`adjusted_value - baseline_value`**
    (the full auction delta). **`explain_v2.adjustments`** reconcile to that same delta.

    **Developer portal — key minting:** `GET /api/keys/status` and `POST /api/keys/issue` mint
    MongoDB `apikeys` documents by default; set `KEY_ISSUANCE_ENABLED=0|false|off` to disable.
    Optional `KEY_ISSUANCE_SECRET` requires header `X-Key-Issuance-Token`.
  version: 1.0.0

servers:
  - url: https://{host}
    variables:
      host:
        default: localhost:3001

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key

  schemas:
    FieldError:
      type: object
      required: [field, message]
      properties:
        field:
          type: string
          description: JSON path style (empty string for root)
        message:
          type: string

    ZodValidationErrorBody:
      type: object
      required: [errors]
      properties:
        errors:
          type: array
          items:
            $ref: "#/components/schemas/FieldError"

    RateLimitErrorBody:
      type: object
      properties:
        message:
          type: string
        error:
          type: object
          properties:
            code:
              type: string
              example: RATE_LIMIT_EXCEEDED

    ValuationResponse:
      type: object
      description: |
        Per-player `baseline_value` is list price after the scoring/roster baseline engine
        (not raw Mongo `value`).         `inflation_model` selects the inflation pass: `global_v1` uses
        `adjusted_value = baseline_value * inflation_factor` with the **full** undrafted pool as
        the denominator; `surplus_slots_v1` uses roster-derived remaining slots, reserves $1
        per empty slot, and sets `adjusted_value = min_bid + inflation_factor * max(0, baseline_value - replacement)`;
        `replacement_slots_v2` uses slot/position-aware replacement + surplus allocation (Draftroom preferred;
        see `docs/valuation-inflation-semantics.md` and response metadata fields). `inflation_factor` may hit workflow floor/cap.
        `inflation_raw` is the pre-clamp ratio (meaning depends on `inflation_model`). `players_remaining`
        is always the count of the full undrafted pool; `pool_value_remaining` matches the inflation
        denominator for the active model. `valuation_model_version` is a deploy label.
      required:
        - engine_contract_version
        - inflation_model
        - inflation_factor
        - inflation_raw
        - inflation_bounded_by
        - total_budget_remaining
        - pool_value_remaining
        - players_remaining
        - valuations
        - calculated_at
      properties:
        engine_contract_version:
          type: string
          example: "1"
        inflation_model:
          type: string
          enum: [global_v1, surplus_slots_v1, replacement_slots_v2]
          description: Inflation pass used for this response (echoes request defaulting rule).
        inflation_factor:
          type: number
          description: League-wide multiplier after cap/floor (applied).
        inflation_raw:
          type: number
          description: Pre–cap/floor ratio; see `inflation_model` (global = budget ÷ full pool $; surplus v1 = surplus cash ÷ draftable surplus $; v2 = surplus cash ÷ total_surplus_mass when applicable).
        inflation_bounded_by:
          type: string
          enum: [none, cap, floor]
          description: Whether the applied inflation factor was clamped from raw.
        total_budget_remaining:
          type: number
        pool_value_remaining:
          type: number
          description: Inflation denominator for the active model (full undrafted baseline $ for `global_v1`; sum of surplus baseline $ in the draftable slice for `surplus_slots_v1`; `total_surplus_mass` for `replacement_slots_v2`).
        remaining_slots:
          type: integer
          minimum: 0
          description: Present for `replacement_slots_v2` — unfilled roster slots (league-wide) before the undrafted assignment pass.
        min_bid:
          type: number
          description: Present for `replacement_slots_v2` — reserved dollars per remaining slot (currently 1).
        surplus_cash:
          type: number
          minimum: 0
          description: Present for `replacement_slots_v2` — `total_budget_remaining − remaining_slots×min_bid`.
        total_surplus_mass:
          type: number
          minimum: 0
          description: Present for `replacement_slots_v2` — sum of per-player surplus basis over the slot-assigned draftable pool.
        draftable_pool_size:
          type: integer
          minimum: 0
          description: Present for `replacement_slots_v2` — count of undrafted players assigned into remaining slots in the greedy fill.
        replacement_values_by_slot_or_position:
          type: object
          additionalProperties:
            type: number
            minimum: 0
          description: Present for `replacement_slots_v2` — replacement baseline $ per roster slot key after greedy fill.
        fallback_reason:
          type: string
          nullable: true
          description: Present for `replacement_slots_v2` when a non-standard path was used (e.g. `no_surplus_cash`); never falls back to `global_v1`.
        players_remaining:
          type: integer
          description: Count of undrafted players in the inflation basis pool (full pool; not filtered by player_ids).
        calculated_at:
          type: string
        valuation_model_version:
          type: string
          description: Operator-facing build label (env `VALUATION_MODEL_VERSION`, CI git SHA, or package.json).
        market_notes:
          type: array
          description: Human-readable league context (inflation, scarcity, monopolies).
          items:
            type: string
        recommended_bid_note:
          type: string
          description: How `recommended_bid` is derived (phase-aware clearing price).
        user_team_id_used:
          type: string
          description: Team context used for team_adjusted_value (defaults to team_1).
        team_adjusted_value_note:
          type: string
          description: How `team_adjusted_value` is derived from roster economics.
        phase_indicator:
          type: string
          enum: [early, mid, late]
          description: Draft phase from league-wide slot fill vs remaining empty slots (server-derived).
        context_v2:
          type: object
          description: Structured valuation context for UI clarity and machine consumption.
          properties:
            schema_version:
              type: string
              enum: ["2"]
            calculated_at:
              type: string
            scope:
              type: object
              properties:
                league_id:
                  type: string
                player_id:
                  type: string
                position:
                  type: string
            market_summary:
              type: object
              properties:
                headline:
                  type: string
                inflation_factor:
                  type: number
                inflation_raw:
                  type: number
                inflation_bounded_by:
                  type: string
                  enum: [none, cap, floor]
                inflation_percent_vs_neutral:
                  type: number
                budget_left:
                  type: number
                players_left:
                  type: integer
                model_version:
                  type: string
            position_alerts:
              type: array
              items:
                type: object
                properties:
                  position:
                    type: string
                  severity:
                    type: string
                    enum: [low, medium, high, critical]
                  urgency_score:
                    type: number
                  message:
                    type: string
                  recommended_action:
                    type: string
            assumptions:
              type: array
              items:
                type: string
            confidence:
              type: object
              properties:
                overall:
                  type: number
                notes:
                  type: string
        valuations:
          type: array
          items:
            $ref: "#/components/schemas/ValuedPlayer"

    ValuedPlayer:
      type: object
      description: |
        `scarcity_adjustment` is always 0 (roster scarcity is inside `baseline_value`).
        `inflation_adjustment` is the full delta `adjusted_value - baseline_value`.
      properties:
        player_id:
          type: string
        name:
          type: string
        position:
          type: string
        team:
          type: string
        adp:
          type: number
        tier:
          type: integer
        baseline_value:
          type: number
          description: Post–baseline-engine list price (includes embedded scarcity when applicable).
        adjusted_value:
          type: number
          description: baseline_value × league inflation_factor (same factor on every row).
        recommended_bid:
          type: number
          description: Phase-aware expected clearing price (may lie outside adjusted_value/baseline_value band).
        team_adjusted_value:
          type: number
          description: Team-specific marginal value (adjusted_value scaled by need, dollars per open slot vs league, slot scarcity, replacement drop-off; not capped to max bid).
        edge:
          type: number
          description: team_adjusted_value minus recommended_bid.
        indicator:
          type: string
          enum: [Steal, Reach, Fair Value]
        inflation_factor:
          type: number
        baseline_components:
          type: object
          properties:
            scoring_format:
              type: string
            projection_component:
              type: number
            scarcity_component:
              type: number
        scarcity_adjustment:
          type: number
          description: Always 0; use baseline_components.scarcity_component and baseline_value for scarcity economics.
        inflation_adjustment:
          type: number
          description: adjusted_value minus baseline_value (total auction delta from inflation factor).
        why:
          type: array
          description: Short rationale strings for UI / trust.
          items:
            type: string
        explain_v2:
          type: object
          description: Normalized per-player valuation explanation.
          properties:
            indicator:
              type: string
              enum: [Steal, Reach, Fair Value]
            auction_target:
              type: number
            list_value:
              type: number
            adjustments:
              type: object
              description: scarcity is 0 (embedded in list_value); inflation + other = auction_target − list_value.
              properties:
                scarcity:
                  type: number
                inflation:
                  type: number
                other:
                  type: number
            drivers:
              type: array
              items:
                type: object
                properties:
                  label:
                    type: string
                  impact:
                    type: number
                  reason:
                    type: string
            confidence:
              type: number

    ScarcityResponse:
      type: object
      properties:
        engine_contract_version:
          type: string
          example: "1"
        schema_version:
          type: string
          enum: ["2"]
        calculated_at:
          type: string
        analyzed_at:
          type: string
        selected_position:
          type: string
        selected_position_explainer:
          type: object
          properties:
            severity:
              type: string
              enum: [low, medium, high, critical]
            urgency_score:
              type: number
            message:
              type: string
            recommended_action:
              type: string
        positions:
          type: array
          items:
            type: object
            properties:
              position:
                type: string
              elite_remaining:
                type: integer
              mid_tier_remaining:
                type: integer
              depth_remaining:
                type: integer
              total_remaining:
                type: integer
              scarcity_score:
                type: number
              alert:
                type: string
                nullable: true
        tier_buckets:
          type: array
          description: Draft-time scarcity buckets by explicit tier labels (Tier 1..Tier 5).
          items:
            type: object
            properties:
              position:
                type: string
              buckets:
                type: array
                items:
                  type: object
                  properties:
                    tier:
                      type: string
                    remaining:
                      type: integer
                    urgency_score:
                      type: number
                    message:
                      type: string
                    recommended_action:
                      type: string
        monopoly_warnings:
          type: array
          items:
            type: object
            properties:
              team_id:
                type: string
              category:
                type: string
              controlled_players:
                type: array
                items:
                  type: string
              share_percentage:
                type: number
              message:
                type: string

    CatalogBatchValuesResponse:
      type: object
      required: [engine_contract_version, players]
      properties:
        engine_contract_version:
          type: string
          example: "1"
        players:
          type: array
          items:
            type: object
            properties:
              player_id:
                type: string
              name:
                type: string
              position:
                type: string
              team:
                type: string
              value:
                type: number
              tier:
                type: integer
              adp:
                type: number

    AppErrorEnvelope:
      type: object
      required: [message, error]
      properties:
        message:
          type: string
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: true

    KeyIssuanceStatusResponse:
      type: object
      required: [issuanceEnabled, requiresToken]
      properties:
        issuanceEnabled:
          type: boolean
        requiresToken:
          type: boolean

    KeyIssueRequest:
      type: object
      required: [owner]
      properties:
        owner:
          type: string
          minLength: 1
          maxLength: 200
          description: Short label stored on the key (shown in usage stats).
        email:
          type: string
          format: email
        tier:
          type: string
          enum: [free, standard, premium]
          default: free

    KeyIssueResponse:
      type: object
      required: [apiKey, owner, tier, message]
      properties:
        apiKey:
          type: string
          description: |
            Plaintext secret; returned only in this response. Format `amethyst_live_<20 hex>.<48 hex>`
            (same as `POST /api/keys` response field `secret`).
          example: amethyst_live_a1b2c3d4e5f678901234.a1b2c3d4e5f678901234567890123456789012345678901234
        owner:
          type: string
        email:
          type: string
          nullable: true
        tier:
          type: string
          enum: [free, standard, premium]
        message:
          type: string

paths:
  /api/keys/status:
    get:
      summary: Key issuance availability (developer portal)
      description: |
        Returns whether `POST /api/keys/issue` is enabled. Issuance defaults to **on** unless
        `KEY_ISSUANCE_ENABLED` is set to `0`, `false`, or `off`. Also reports whether
        `X-Key-Issuance-Token` is required (`KEY_ISSUANCE_SECRET`).
      operationId: getKeyIssuanceStatus
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyIssuanceStatusResponse"

  /api/keys/issue:
    post:
      summary: Mint a new API key (plaintext once)
      description: |
        Creates an `apikeys` document. Response includes `apiKey` exactly once; the server does not
        list or re-display it. Returns **503** when issuance is explicitly disabled
        (`KEY_ISSUANCE_ENABLED=0|false|off`).
      operationId: issueApiKey
      parameters:
        - in: header
          name: X-Key-Issuance-Token
          schema:
            type: string
          required: false
          description: Required when server env `KEY_ISSUANCE_SECRET` is set (must match).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KeyIssueRequest"
      responses:
        "201":
          description: Key created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyIssueResponse"
        "400":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppErrorEnvelope"
        "401":
          description: Missing or invalid issuance token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppErrorEnvelope"
        "503":
          description: Key issuance disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppErrorEnvelope"

  /analysis/scarcity:
    post:
      summary: Positional scarcity and tier-bucket urgency
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [drafted_players]
              properties:
                drafted_players:
                  type: array
                  items:
                    type: object
                    additionalProperties: true
                scoring_categories:
                  type: array
                  items:
                    type: object
                    additionalProperties: true
                position:
                  type: string
                num_teams:
                  type: integer
                league_scope:
                  type: string
                  enum: [Mixed, AL, NL]
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScarcityResponse"
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ZodValidationErrorBody"
  /valuation/calculate:
    post:
      summary: Inflation-adjusted auction values
      security:
        - ApiKeyAuth: []
      parameters:
        - in: header
          name: X-Request-Id
          schema:
            type: string
          required: false
      requestBody:
        required: true
        description: |
          Flat body: see repository file `schemas/valuation-request.v1.schema.json` (source of truth).
          Nested alternate: `schemas/valuation-request-v1.json` (`league` + `draft_state`).
        content:
          application/json:
            schema:
              type: object
              properties:
                user_team_id:
                  type: string
                  description: Optional team context for team_adjusted_value (defaults to team_1).
              additionalProperties: true
      responses:
        "200":
          description: OK
          headers:
            X-Request-Id:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValuationResponse"
        "400":
          description: Request validation failed (Zod, economics rules); body is only `errors[]`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ZodValidationErrorBody"
        "422":
          description: Valuation output failed sanity checks (no price payload)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ZodValidationErrorBody"
        "429":
          description: |
            Per-key rate limit exceeded (`RATE_LIMIT_VALUATION_*`, or set `RATE_LIMIT_ENABLED=0`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RateLimitErrorBody"

  /catalog/batch-values:
    post:
      summary: Baseline value / tier / adp for player ids
      security:
        - ApiKeyAuth: []
      parameters:
        - in: header
          name: X-Request-Id
          schema:
            type: string
          required: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [player_ids]
              properties:
                player_ids:
                  type: array
                  items:
                    type: string
                league_scope:
                  type: string
                  enum: [Mixed, AL, NL]
                pos_eligibility_threshold:
                  type: number
      responses:
        "200":
          headers:
            X-Request-Id:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogBatchValuesResponse"
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ZodValidationErrorBody"
        "429":
          description: |
            Per-key rate limit exceeded (`RATE_LIMIT_CATALOG_*`, or set `RATE_LIMIT_ENABLED=0`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RateLimitErrorBody"
